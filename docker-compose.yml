services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bonuzchess
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/bonuzchess
      - CONTRACT_ADDRESS=${CONTRACT_ADDRESS}
      - BACKEND_SIGNER_PRIVATE_KEY=${BACKEND_SIGNER_PRIVATE_KEY}
      - RPC_URL=${RPC_URL}
      - CHAIN_ID=${CHAIN_ID:-31337}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: ./backend
    restart: unless-stopped
    command: ["node", "--import", "tsx", "src/workers/timeout-monitor.ts"]
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/bonuzchess
      - CONTRACT_ADDRESS=${CONTRACT_ADDRESS}
      - BACKEND_SIGNER_PRIVATE_KEY=${BACKEND_SIGNER_PRIVATE_KEY}
      - RPC_URL=${RPC_URL}
      - CHAIN_ID=${CHAIN_ID:-31337}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}
        - NEXT_PUBLIC_CONTRACT_ADDRESS=${CONTRACT_ADDRESS}
        - NEXT_PUBLIC_CHAIN_ID=${CHAIN_ID:-31337}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
